<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTEROOM SOCIETY</title>
    <link rel="icon" type="image/png" href="images/logo_transparent.png">
</head>
<body>
    <style>
  #splash-screen {
    position: fixed;
    inset: 0;
    background: #0a0a0a;
    display: flex;
    flex-direction: column; 
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.8s ease, visibility 0.8s;
    overflow: hidden;
  }

  #splash-screen.hidden {
    opacity: 0;
    visibility: hidden;
  }

  .splash-logo-wrap {
    width: 280px;
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 2.5rem;
    animation: logoSpin 1.8s cubic-bezier(0.4,0,0.2,1) forwards;
  }

  @keyframes logoSpin {
    0%   { transform: rotate(0deg) scale(0.3); opacity: 0; }
    55%  { transform: rotate(360deg) scale(1.08); opacity: 1; }
    75%  { transform: rotate(360deg) scale(0.96); }
    100% { transform: rotate(360deg) scale(1); opacity: 1; }
  }

  .splash-logo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .splash-letters {
    display: flex;
    gap: 0px;
    margin-bottom: 0.4rem;
  }

  .splash-letter {
    font-family: 'Bebas Neue', Arial, sans-serif;
    font-size: 26px;
    color: #F0EDE6;
    opacity: 0;
    transform: translateY(28px);
    animation: letterDrop 0.4s ease forwards;
  }

  .splash-letter.pink { color: #e91e8c; }

  @keyframes letterDrop {
    to { opacity: 1; transform: translateY(0); }
  }

  .splash-subtitle {
    font-size: 10px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(136,136,128,0.6);
    opacity: 0;
    animation: fadeIn 0.6s ease forwards;
    animation-delay: 3s;
  }

  @keyframes fadeIn { to { opacity: 1; } }

  .splash-bar {
    width: 100px;
    height: 1.5px;
    background: rgba(255,255,255,0.07);
    border-radius: 2px;
    margin-top: 2rem;
    overflow: hidden;
    opacity: 0;
    animation: fadeIn 0.3s ease forwards;
    animation-delay: 1.9s;
  }

  .splash-bar-fill {
    height: 100%;
    background: #e91e8c;
    width: 0%;
    animation: fillBar 1.6s ease forwards;
    animation-delay: 1.9s;
  }

  @keyframes fillBar { to { width: 100%; } }

  .splash-particles { position: absolute; inset: 0; pointer-events: none; }

  .splash-p {
    position: absolute;
    border-radius: 50%;
    background: #e91e8c;
    opacity: 0;
    animation: floatUp linear infinite;
  }

  @keyframes floatUp {
    0%   { opacity: 0; transform: translateY(0) scale(0); }
    15%  { opacity: 0.4; }
    100% { opacity: 0; transform: translateY(-280px) scale(0.4); }
  }
</style>

<div id="splash-screen">
  <div class="splash-particles" id="splashPts"></div>

  <div class="splash-logo-wrap">
    <img src="images/logo_transparent.png" alt="INTHEROOM">
  </div>

  <div class="splash-letters" id="splashLetters"></div>
  <div class="splash-subtitle">The culture is in the room</div>

  <div class="splash-bar">
    <div class="splash-bar-fill"></div>
  </div>
</div>

<script>
  // Lettres animées
  const word = ['I','N','T','H','E','R','O','O','M',' ','S','O','C','I','E','T','Y'];
  const lr = document.getElementById('splashLetters');
  word.forEach((ch, i) => {
    if (ch === ' ') {
      const sp = document.createElement('div');
      sp.style.width = '14px';
      lr.appendChild(sp);
      return;
    }
    const el = document.createElement('div');
    el.className = 'splash-letter' + (i >= 10 ? ' pink' : '');
    el.textContent = ch;
    el.style.animationDelay = (1.9 + i * 0.07) + 's';
    lr.appendChild(el);
  });

  // Particules
  const pts = document.getElementById('splashPts');
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'splash-p';
    const size = 1.5 + Math.random() * 2.5;
    p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;bottom:${Math.random()*25}%;animation-duration:${3+Math.random()*5}s;animation-delay:${Math.random()*5}s`;
    pts.appendChild(p);
  }

  // Disparition après 3.5s
  setTimeout(() => {
    document.getElementById('splash-screen').classList.add('hidden');
    window.location.href="accueil.html";
  }, 5000);
</script>
</body>
</html>
